---
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
      time: "16:00"
    groups:
      aws-sdk:
         patterns:
          - "github.com/aws/aws-sdk-go*"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
      time: "16:00"
    commit-message:
      prefix: "chore(deps)"
